<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文本编码/加密</title>
<link rel="stylesheet" href="../common.css">
<style>
.p-app{display:flex;flex-direction:column;height:100vh}
.p-toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.p-btn{height:28px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-tertiary);color:var(--text-primary);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.p-btn:hover{background:var(--bg-hover)}
.p-btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.p-btn-primary:hover{background:var(--accent-hover)}
.p-select{height:28px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-tertiary);color:var(--text-primary);font-size:12px;outline:none;cursor:pointer;min-width:130px}
.p-spacer{flex:1}
.p-body{display:flex;flex:1;min-height:0;gap:1px}
.p-pane{display:flex;flex-direction:column;flex:1;min-width:0;background:var(--bg-secondary)}
.p-pane-header{padding:6px 10px;flex-shrink:0;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg-secondary);border-bottom:1px solid var(--border)}
.p-textarea{flex:1;resize:none;padding:10px;border:none;outline:none;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-mono);font-size:13px;line-height:1.5;tab-size:2}
.p-textarea::placeholder{color:var(--text-placeholder)}.p-textarea-input:focus{background:var(--bg-tertiary)}.p-textarea-output{background:var(--bg-tertiary)}
.p-statusbar{padding:4px 10px;font-size:11px;color:var(--text-muted);background:var(--bg-secondary);border-top:1px solid var(--border);flex-shrink:0;min-height:24px}
</style>
</head>
<body>
<div class="p-app">
  <div class="p-toolbar">
    <select class="p-select" id="opSelect">
      <option value="base64-encode">Base64 编码</option>
      <option value="base64-decode">Base64 解码</option>
      <option value="url-encode">URL 编码</option>
      <option value="url-decode">URL 解码</option>
      <option value="html-encode">HTML 编码</option>
      <option value="html-decode">HTML 解码</option>
      <option value="md5-hash">MD5 哈希</option>
      <option value="sha256-hash">SHA256 哈希</option>
    </select>
    <button class="p-btn p-btn-primary" id="btnProcess">▶ 执行</button>
    <button class="p-btn" id="btnCopy">📋 复制</button>
    <span class="p-spacer"></span>
    <button class="p-btn" id="btnClear">✕ 清空</button>
  </div>
  <div class="p-body">
    <div class="p-pane">
      <div class="p-pane-header">输入</div>
      <textarea id="inputArea" class="p-textarea p-textarea-input" placeholder="请输入要处理的文本…" spellcheck="false"></textarea>
    </div>
    <div class="p-pane">
      <div class="p-pane-header">输出</div>
      <textarea id="outputArea" class="p-textarea p-textarea-output" readonly placeholder="结果…" spellcheck="false"></textarea>
    </div>
  </div>
  <div class="p-statusbar" id="statusBar">等待输入…</div>
</div>
<script>
(function(){
  var inputArea=document.getElementById('inputArea'),outputArea=document.getElementById('outputArea')
  var opSelect=document.getElementById('opSelect'),btnProcess=document.getElementById('btnProcess')
  var btnCopy=document.getElementById('btnCopy'),btnClear=document.getElementById('btnClear'),statusText=document.getElementById('statusBar')
  btnProcess.addEventListener('click',process)
  btnCopy.addEventListener('click',function(){if(outputArea.value){try{navigator.clipboard.writeText(outputArea.value);statusText.textContent='已复制！'}catch(e){}}})
  btnClear.addEventListener('click',function(){inputArea.value='';outputArea.value='';statusText.textContent='等待输入…';inputArea.focus()})
  document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();process()};if(e.key==='Escape')inputArea.focus()})
  var autoTimer;inputArea.addEventListener('input',function(){if(autoTimer)clearTimeout(autoTimer);if(inputArea.value.trim())autoTimer=setTimeout(process,500);else{outputArea.value='';statusText.textContent='等待输入…'}})
  opSelect.addEventListener('change',function(){if(inputArea.value.trim())process()})

  function process(){
    var text=inputArea.value.trim()
    if(!text){outputArea.value='';statusText.textContent='等待输入…';return}
    var op=opSelect.value
    try{
      var result
      switch(op){
        case 'base64-encode':result=btoa(text);break
        case 'base64-decode':result=atob(text);break
        case 'url-encode':result=encodeURIComponent(text);break
        case 'url-decode':result=decodeURIComponent(text);break
        case 'html-encode':result=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');break
        case 'html-decode':result=text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");break
        case 'md5-hash':result=md5(text);break
        case 'sha256-hash':result=sha256(text);break
        default:result='未知操作'
      }
      outputArea.value=result
      statusText.textContent='✅ '+(opSelect.options[opSelect.selectedIndex].text)+' | '+result.length+' 字符'
    } catch(e){
      outputArea.value=''
      statusText.textContent='❌ 错误: '+e.message
    }
  }
  // MD5
  function md5(s){var b=function(s){var b=[];for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);c<128?b.push(c):c<2048?b.push(192|c>>6,128|c&63):b.push(224|c>>12,128|c>>6&63,128|c&63)}return b}(s);b.push(128);while(b.length*8%512!==448)b.push(0);var bl=s.length*8;for(var i=0;i<8;i++)b.push(bl>>>i*8&0xff);var K=[0xd76aa478,0xe8c7b756,0x242070db,0xc1bdceee,0xf57c0faf,0x4787c62a,0xa8304613,0xfd469501,0x698098d8,0x8b44f7af,0xffff5bb1,0x895cd7be,0x6b901122,0xfd987193,0xa679438e,0x49b40821,0xf61e2562,0xc040b340,0x265e5a51,0xe9b6c7aa,0xd62f105d,0x02441453,0xd8a1e681,0xe7d3fbc8,0x21e1cde6,0xc33707d6,0xf4d50d87,0x455a14ed,0xa9e3e905,0xfcefa3f8,0x676f02d9,0x8d2a4c8a,0xfffa3942,0x8771f681,0x6d9d6122,0xfde5380c,0xa4beea44,0x4bdecfa9,0xf6bb4b60,0xbebfbc70,0x289b7ec6,0xeaa127fa,0xd4ef3085,0x04881d05,0xd9d4d039,0xe6db99e5,0x1fa27cf8,0xc4ac5665,0xf4292244,0x432aff97,0xab9423a7,0xfc93a039,0x655b59c3,0x8f0ccc92,0xffeff47d,0x85845dd1,0x6fa87e4f,0xfe2ce6e0,0xa3014314,0x4e0811a1,0xf7537e82,0xbd3af235,0x2ad7d2bb,0xeb86d391];var S=[7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];var h0=0x67452301,h1=0xefcdab89,h2=0x98badcfe,h3=0x10325476;for(var i=0;i<b.length;i+=64){var w=[];for(var j=0;j<16;j++)w[j]=b[i+j*4]|b[i+j*4+1]<<8|b[i+j*4+2]<<16|b[i+j*4+3]<<24;var a=h0,b2=h1,c=h2,d=h3;for(var k=0;k<64;k++){var f,g;if(k<16){f=(b2&c)|(~b2&d);g=k}else if(k<32){f=(d&b2)|(~d&c);g=(5*k+1)%16}else if(k<48){f=b2^c^d;g=(3*k+5)%16}else{f=c^(b2|~d);g=7*k%16};f=(f+a+K[k]+w[g])>>>0;var t=d;d=c;c=b2;b2=(b2+((f<<S[k])|(f>>>(32-S[k]))))>>>0;a=t}h0=(h0+a)>>>0;h1=(h1+b2)>>>0;h2=(h2+c)>>>0;h3=(h3+d)>>>0}function hx(n){var s=(n>>>0).toString(16);while(s.length<8)s='0'+s;return s}return hx(h0)+hx(h1)+hx(h2)+hx(h3)}
  // SHA256
  function sha256(s){var b=function(s){var b=[];for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);c<128?b.push(c):c<2048?b.push(192|c>>6,128|c&63):b.push(224|c>>12,128|c>>6&63,128|c&63)}return b}(s);b.push(128);while(b.length*8%512!==448)b.push(0);var bl=s.length*8;for(var i=0;i<8;i++)b.push(bl>>>(56-i*8)&0xff);var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];for(var i=0;i<b.length;i+=64){var w=[];for(var t=0;t<16;t++)w[t]=b[i+t*4]<<24|b[i+t*4+1]<<16|b[i+t*4+2]<<8|b[i+t*4+3];for(var t2=16;t2<64;t2++){var s0=((w[t2-15]>>>7|w[t2-15]<<25)^(w[t2-15]>>>18|w[t2-15]<<14)^(w[t2-15]>>>3))>>>0;var s1=((w[t2-2]>>>17|w[t2-2]<<15)^(w[t2-2]>>>19|w[t2-2]<<13)^(w[t2-2]>>>10))>>>0;w[t2]=(s1+w[t2-7]+s0+w[t2-16])>>>0}var a=H[0],b2=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];for(var t3=0;t3<64;t3++){var S1=((e>>>6|e<<26)^(e>>>11|e<<21)^(e>>>25|e<<7))>>>0;var ch=(e&f)^(~e&g);var t1=(h+S1+ch+K[t3]+w[t3])>>>0;var S0=((a>>>2|a<<30)^(a>>>13|a<<19)^(a>>>22|a<<10))>>>0;var maj=(a&b2)^(a&c)^(b2&c);var t2=(S0+maj)>>>0;h=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b2;b2=a;a=(t1+t2)>>>0}H[0]=(H[0]+a)>>>0;H[1]=(H[1]+b2)>>>0;H[2]=(H[2]+c)>>>0;H[3]=(H[3]+d)>>>0;H[4]=(H[4]+e)>>>0;H[5]=(H[5]+f)>>>0;H[6]=(H[6]+g)>>>0;H[7]=(H[7]+h)>>>0}function hx(n){var s=(n>>>0).toString(16);while(s.length<8)s='0'+s;return s}return hx(H[0])+hx(H[1])+hx(H[2])+hx(H[3])+hx(H[4])+hx(H[5])+hx(H[6])+hx(H[7])}
  inputArea.focus()
})()
</script>
</body>
</html>
