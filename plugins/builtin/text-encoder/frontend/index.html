<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文本编码/加密</title>
<link rel="stylesheet" href="../common.css">
<style>
.p-app{display:flex;flex-direction:column;height:100vh}
.p-toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.p-btn{height:28px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-tertiary);color:var(--text-primary);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.p-btn:hover{background:var(--bg-hover)}
.p-btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.p-btn-primary:hover{background:var(--accent-hover)}
.p-select{height:28px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-tertiary);color:var(--text-primary);font-size:12px;outline:none;cursor:pointer;min-width:130px}
.p-spacer{flex:1}
.p-body{display:flex;flex:1;min-height:0;gap:1px}
.p-pane{display:flex;flex-direction:column;flex:1;min-width:0;background:var(--bg-secondary)}
.p-pane-header{padding:6px 10px;flex-shrink:0;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg-secondary);border-bottom:1px solid var(--border)}
.p-textarea{flex:1;resize:none;padding:10px;border:none;outline:none;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-mono);font-size:13px;line-height:1.5;tab-size:2}
.p-textarea::placeholder{color:var(--text-placeholder)}.p-textarea-input:focus{background:var(--bg-tertiary)}.p-textarea-output{background:var(--bg-tertiary)}
.p-statusbar{padding:4px 10px;font-size:11px;color:var(--text-muted);background:var(--bg-secondary);border-top:1px solid var(--border);flex-shrink:0;min-height:24px}
</style>
</head>
<body>
<div class="p-app">
  <div class="p-toolbar">
    <select class="p-select" id="opSelect">
      <option value="base64-encode">Base64 编码</option>
      <option value="base64-decode">Base64 解码</option>
      <option value="url-encode">URL 编码</option>
      <option value="url-decode">URL 解码</option>
      <option value="html-encode">HTML 编码</option>
      <option value="html-decode">HTML 解码</option>
      <option value="md5-hash">MD5 哈希</option>
      <option value="sha256-hash">SHA256 哈希</option>
    </select>
    <button class="p-btn p-btn-primary" id="btnProcess">▶ 执行</button>
    <button class="p-btn" id="btnCopy">📋 复制</button>
    <span class="p-spacer"></span>
    <button class="p-btn" id="btnClear">✕ 清空</button>
  </div>
  <div class="p-body">
    <div class="p-pane">
      <div class="p-pane-header">输入</div>
      <textarea id="inputArea" class="p-textarea p-textarea-input" placeholder="请输入要处理的文本…" spellcheck="false"></textarea>
    </div>
    <div class="p-pane">
      <div class="p-pane-header">输出</div>
      <textarea id="outputArea" class="p-textarea p-textarea-output" readonly placeholder="结果…" spellcheck="false"></textarea>
    </div>
  </div>
  <div class="p-statusbar" id="statusBar">等待输入…</div>
</div>
<script>
(function(){
  var inputArea=document.getElementById('inputArea'),outputArea=document.getElementById('outputArea')
  var opSelect=document.getElementById('opSelect'),btnProcess=document.getElementById('btnProcess')
  var btnCopy=document.getElementById('btnCopy'),btnClear=document.getElementById('btnClear'),statusText=document.getElementById('statusBar')

  var reqSeq=0
  var pending={}

  // 通过宿主桥接调用后端（Go 标准库实现的 crypto，保证中文/emoji/多字节全部正确）
  function pluginExec(command, input){
    return new Promise(function(resolve, reject){
      var id='te_'+(++reqSeq)
      pending[id]={resolve:resolve, reject:reject}
      parent.postMessage({type:'plugin:execute', id:id, command:command, input:input}, '*')
    })
  }

  // 接收后端返回结果
  window.addEventListener('message', function(e){
    var d=e&&e.data
    if(!d||d.type!=='plugin:result'||!d.id) return
    var p=pending[d.id]
    if(!p) return
    delete pending[d.id]
    if(d.error) p.reject(new Error(d.error))
    else p.resolve(d.data)
  })

  btnProcess.addEventListener('click', process)
  btnCopy.addEventListener('click',function(){if(outputArea.value){try{navigator.clipboard.writeText(outputArea.value);statusText.textContent='已复制！'}catch(e){}}})
  btnClear.addEventListener('click',function(){inputArea.value='';outputArea.value='';statusText.textContent='等待输入…';inputArea.focus()})
  document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();process()};if(e.key==='Escape')inputArea.focus()})
  var autoTimer;inputArea.addEventListener('input',function(){if(autoTimer)clearTimeout(autoTimer);if(inputArea.value.trim())autoTimer=setTimeout(process,500);else{outputArea.value='';statusText.textContent='等待输入…'}})
  opSelect.addEventListener('change',function(){if(inputArea.value.trim())process()})

  // 接收来自命令面板的初始数据：自动选中命中的功能并回显文字、立即计算
  window.addEventListener('message',function(e){
    var d=e&&e.data
    if(!d||d.type!=='plugin:init'||!d.data)return
    var pd=d.data
    if(pd.command){
      for(var i=0;i<opSelect.options.length;i++){
        if(opSelect.options[i].value===pd.command){opSelect.selectedIndex=i;break}
      }
    }
    if(pd.text){
      inputArea.value=pd.text
      process()
      try{outputArea.focus();outputArea.select()}catch(_){}
    }
  })

  function process(){
    var text=inputArea.value.trim()
    if(!text){outputArea.value='';statusText.textContent='等待输入…';return}
    var op=opSelect.value
    statusText.textContent='计算中…'
    pluginExec(op, {text:text}).then(function(res){
      var r = (res && typeof res==='object' && res.text!==undefined) ? res.text : (typeof res==='string'?res:'')
      outputArea.value=r
      statusText.textContent='✅ '+(opSelect.options[opSelect.selectedIndex].text)+' | '+r.length+' 字符'
    }).catch(function(err){
      outputArea.value=''
      statusText.textContent='❌ 错误: '+(err&&err.message?err.message:err)
    })
  }
  inputArea.focus()
})()
</script>
</body>
</html>
