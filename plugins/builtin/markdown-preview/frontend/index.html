<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Markdown 渲染</title>
<link rel="stylesheet" href="../common.css">
<style>
.md-body{display:flex;flex:1;min-height:0;gap:1px}
.md-pane{display:flex;flex-direction:column;flex:1;min-width:0;background:var(--bg-secondary)}
.md-pane-header{padding:5px 10px;flex-shrink:0;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg-secondary);border-bottom:1px solid var(--border)}
.md-preview{flex:1;overflow:auto;padding:12px 16px;background:var(--bg-primary);line-height:1.7;font-size:14px}
.md-preview h1{font-size:20px;font-weight:600;margin:0 0 10px;color:var(--text-primary);border-bottom:1px solid var(--border);padding-bottom:6px}
.md-preview h2{font-size:17px;font-weight:600;margin:16px 0 8px;color:var(--text-primary)}
.md-preview h3{font-size:15px;font-weight:600;margin:14px 0 6px;color:var(--text-secondary)}
.md-preview p{margin:6px 0}
.md-preview code{background:var(--bg-tertiary);padding:2px 5px;border-radius:3px;font-family:var(--font-mono);font-size:12px;color:var(--accent)}
.md-preview pre{background:var(--bg-tertiary);padding:10px 12px;border-radius:6px;overflow-x:auto;margin:8px 0;border:1px solid var(--border)}
.md-preview pre code{background:none;padding:0;color:var(--text-primary)}
.md-preview blockquote{border-left:3px solid var(--accent);padding:4px 12px;margin:8px 0;color:var(--text-secondary);background:var(--bg-tertiary);border-radius:0 6px 6px 0}
.md-preview ul,.md-preview ol{padding-left:20px;margin:6px 0}
.md-preview li{margin:2px 0}
.md-preview table{border-collapse:collapse;margin:8px 0;width:100%}
.md-preview th,.md-preview td{border:1px solid var(--border);padding:6px 10px;text-align:left;font-size:12px}
.md-preview th{background:var(--bg-tertiary);color:var(--text-secondary);font-weight:500}
.md-preview a{color:var(--accent);text-decoration:none}
.md-preview a:hover{text-decoration:underline}
.md-preview hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.md-preview img{max-width:100%;border-radius:4px}
</style>
</head>
<body>
<div class="p-app">
  <div class="p-toolbar">
    <span class="p-label">Markdown</span>
    <span class="p-spacer"></span>
    <button class="p-btn" id="btnCopy">📋 复制 HTML</button>
    <button class="p-btn" id="btnClear">✕ 清空</button>
  </div>
  <div class="md-body">
    <div class="md-pane">
      <div class="md-pane-header">编辑</div>
      <textarea id="mdInput" class="p-textarea" placeholder="输入 Markdown…" spellcheck="false"></textarea>
    </div>
    <div class="md-pane">
      <div class="md-pane-header">预览</div>
      <div id="mdPreview" class="md-preview"></div>
    </div>
  </div>
</div>
<script>
var mdInput=document.getElementById('mdInput'),mdPreview=document.getElementById('mdPreview')
mdInput.addEventListener('input',render)
document.getElementById('btnCopy').addEventListener('click',function(){var html=mdPreview.innerHTML;if(html&&html!=='<p style="color:var(--text-muted);font-size:13px">编辑 Markdown 查看实时预览</p>'){navigator.clipboard.writeText('<div class="md-preview">'+html+'</div>').then(function(){})}})
document.getElementById('btnClear').addEventListener('click',function(){mdInput.value='';render()})
function render(){var text=mdInput.value.trim();if(!text){mdPreview.innerHTML='<p style="color:var(--text-muted);font-size:13px">编辑 Markdown 查看实时预览</p>';return}
var html=''
var lines=text.split('\n'),inCode=false,codeBuf='',codeLang=''
for(var i=0;i<lines.length;i++){var line=lines[i]
if(inCode){if(line.startsWith('```')){html+='<pre><code>'+(codeLang?'<span style="color:var(--text-muted);font-size:11px">'+escapeHtml(codeLang)+'</span>\n':'')+escapeHtml(codeBuf)+'</code></pre>\n';codeBuf='';inCode=false}else{codeBuf+=line+'\n'};continue}
if(line.startsWith('```')){inCode=true;codeLang=line.slice(3).trim();continue}
if(line.startsWith('#')){var level=1;while(line[level]==='#')level++;html+='<h'+level+'>'+escapeHtml(line.slice(level).trim())+'</h'+level+'>\n';continue}
if(line.startsWith('> ')){html+='<blockquote>'+escapeHtml(line.slice(2))+'</blockquote>\n';continue}
if(line.startsWith('- ')||line.startsWith('* ')){html+='<li>'+escapeHtml(line.slice(2))+'</li>\n';continue}
if(line.startsWith('|')){var cells=line.split('|').filter(Boolean);if(i+1<lines.length&&lines[i+1].match(/^[\s|:-]+$/)){i++;continue}else{if(cells.length){html+='<tr>'+cells.map(function(c){return'<td>'+escapeHtml(c.trim())+'</td>'}).join('')+'</tr>\n'}};continue}
if(line===''){html+='<br>';continue}
html+='<p>'+escapeHtml(line)+'</p>\n'}
if(inCode)html+='<pre><code>'+escapeHtml(codeBuf)+'</code></pre>\n'
mdPreview.innerHTML=html
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}}
render()
window.addEventListener('message',function(e){if(e.data&&e.data.type==='plugin:init'&&e.data.data&&e.data.data.text){mdInput.value=e.data.data.text;render()}})
</script>
</body>
</html>
