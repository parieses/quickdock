<style>
.em-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:2px;align-content:start;padding:0 8px 8px}
.em-item{display:flex;align-items:center;justify-content:center;height:48px;font-size:26px;border-radius:var(--radius);cursor:pointer;transition:background .1s,transform .1s;user-select:none;position:relative}
.em-item:hover{background:var(--bg-hover);transform:scale(1.15);z-index:1}
.em-item.copied::after{content:'✅';position:absolute;bottom:2px;right:2px;font-size:10px}
.em-cats{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;padding:0 8px}
.em-cat{height:26px;padding:0 10px;border:1px solid transparent;border-radius:var(--radius-sm);background:transparent;color:var(--text-secondary);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.em-cat:hover{color:var(--text-primary)}
.em-cat.active{border-color:var(--accent);color:var(--accent);background:rgba(74,158,255,.08)}
.em-empty{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text-muted);font-size:13px}
</style>
</head>

function renderCats(){var bar=document.getElementById('catBar');bar.innerHTML=categories.map(function(c){return'<button class="em-cat'+(c===activeCat?' active':'')+'" data-cat="'+escapeHtml(c)+'">'+escapeHtml(c)+'</button>'}).join('')}
function rnd(cps){return eF.apply(null,cps)}
function renderEmojis(){var grid=document.getElementById('emojiGrid'),q=document.getElementById('searchInput').value.trim().toLowerCase(),ct=document.getElementById('countLabel')
  if(q){
    var items=[];for(var c in emojiData){for(var i=0;i<emojiData[c].length;i++){items.push({g:emojiData[c][i],cat:c})}}
    items=items.filter(function(it){var s=rnd(it.g).toLowerCase(),desc='';for(var k in emojiDesc){if(emojiDesc[k]===it.g[0]){desc=k;break}};return s.indexOf(q)>=0||desc.indexOf(q)>=0||it.cat.indexOf(q)>=0})
    if(items.length===0){grid.innerHTML='<div class="em-empty">未找到匹配的 Emoji</div>';ct.textContent='0';return}
    grid.innerHTML=items.map(function(it){return '<div class="em-item" data-cps="'+it.g.join(',')+'">'+rnd(it.g)+'</div>'}).join('');ct.textContent=items.length
  }else{
    var html=''
    for(var ci=0;ci<catKeys.length;ci++){var cat=catKeys[ci];if(activeCat!=='全部'&&cat!==activeCat)continue;var list=emojiData[cat];if(!list)continue
      for(var ei=0;ei<list.length;ei++){html+='<div class="em-item" data-cps="'+list[ei].join(',')+'">'+rnd(list[ei])+'</div>'}}
    grid.innerHTML=html||'<div class="em-empty">无 Emoji</div>';ct.textContent=html.split('</div>').length-1
  }
}
function copyEmoji(el){var cps=(el.getAttribute('data-cps')||'').split(',').map(Number);navigator.clipboard.writeText(eF.apply(null,cps)).then(function(){el.classList.add('copied');setTimeout(function(){el.classList.remove('copied')},800)})}
document.getElementById('emojiGrid').addEventListener('click',function(e){var el=e.target.closest('.em-item');if(el)copyEmoji(el)})
document.getElementById('searchInput').addEventListener('input',renderEmojis)
document.getElementById('catBar').addEventListener('click',function(e){var btn=e.target.closest('.em-cat');if(!btn)return;activeCat=btn.dataset.cat;renderCats();renderEmojis()})

// 命令面板带参打开时（如 "/emoji smile"），自动填入并搜索
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='plugin:init'&&e.data.data&&e.data.data.text){
    document.getElementById('searchInput').value=e.data.data.text
    renderEmojis()
  }
})
renderCats();renderEmojis()
</script>
