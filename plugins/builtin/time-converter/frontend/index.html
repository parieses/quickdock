<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间转换</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div class="header">
    <span id="pluginTitle">时间转换</span>
  </div>
  <div class="main">
    <div class="input-row">
      <input id="timeInput" type="text" placeholder="输入时间 / 时间戳 / now ..." spellcheck="false" />
      <button id="btnConvert">转换</button>
    </div>
    <div id="results" class="results"></div>
  </div>
  <div class="footer">
    <span>支持: 2025-12-25 / 2025/12/25 / Unix 时间戳 / now / 2025年12月25日</span>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
