<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>代码压缩/美化</title>
<link rel="stylesheet" href="../common.css">
<style>
.p-app{display:flex;flex-direction:column;height:100vh}
.p-toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.p-btn{height:28px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-tertiary);color:var(--text-primary);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.p-btn:hover{background:var(--bg-hover)}
.p-btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.p-btn-primary:hover{background:var(--accent-hover)}
.p-btn-toggle{background:transparent}.p-btn-toggle.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.p-btn-group{display:flex;gap:1px}.p-btn-group .p-btn{border-radius:0}
.p-btn-group .p-btn:first-child{border-radius:var(--radius)0 0 var(--radius)}
.p-btn-group .p-btn:last-child{border-radius:0 var(--radius)var(--radius)0}
.p-select{height:28px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-tertiary);color:var(--text-primary);font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.p-spacer{flex:1}
.p-body{display:flex;flex:1;min-height:0;gap:1px}
.p-pane{display:flex;flex-direction:column;flex:1;min-width:0;background:var(--bg-secondary)}
.p-pane-header{padding:6px 10px;flex-shrink:0;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg-secondary);border-bottom:1px solid var(--border)}
.p-textarea{flex:1;resize:none;padding:10px;border:none;outline:none;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-mono);font-size:13px;line-height:1.5;tab-size:2}
.p-textarea::placeholder{color:var(--text-placeholder)}.p-textarea-input:focus{background:var(--bg-tertiary)}.p-textarea-output{background:var(--bg-tertiary)}
.p-statusbar{padding:4px 10px;font-size:11px;color:var(--text-muted);background:var(--bg-secondary);border-top:1px solid var(--border);flex-shrink:0;min-height:24px}
</style>
</head>
<body>
<div class="p-app">
  <div class="p-toolbar">
    <select class="p-select" id="langSelect"><option value="auto">自动检测</option><option value="js">JavaScript</option><option value="css">CSS</option><option value="html">HTML</option></select>
    <div class="p-btn-group">
      <button class="p-btn p-btn-toggle active" id="btnMinify" data-mode="minify">压缩</button>
      <button class="p-btn p-btn-toggle" id="btnPrettify" data-mode="prettify">美化</button>
    </div>
    <button class="p-btn p-btn-primary" id="btnProcess">▶ 执行</button>
    <button class="p-btn" id="btnCopy">📋 复制</button>
    <span class="p-spacer"></span>
    <button class="p-btn" id="btnClear">✕ 清空</button>
  </div>
  <div class="p-body">
    <div class="p-pane">
      <div class="p-pane-header">源代码</div>
      <textarea id="inputArea" class="p-textarea p-textarea-input" placeholder="粘贴 JS / CSS / HTML…" spellcheck="false"></textarea>
    </div>
    <div class="p-pane">
      <div class="p-pane-header">处理结果</div>
      <textarea id="outputArea" class="p-textarea p-textarea-output" readonly placeholder="结果…" spellcheck="false"></textarea>
    </div>
  </div>
  <div class="p-statusbar" id="statusBar">等待输入…</div>
</div>
<script>
(function(){
  var inputArea=document.getElementById('inputArea'),outputArea=document.getElementById('outputArea')
  var btnProcess=document.getElementById('btnProcess'),btnCopy=document.getElementById('btnCopy'),btnClear=document.getElementById('btnClear')
  var btnMinify=document.getElementById('btnMinify'),btnPrettify=document.getElementById('btnPrettify')
  var langSelect=document.getElementById('langSelect'),statusText=document.getElementById('statusBar')
  var mode='minify'
  btnMinify.addEventListener('click',function(){mode='minify';btnMinify.classList.add('active');btnPrettify.classList.remove('active');if(inputArea.value.trim())processCode()})
  btnPrettify.addEventListener('click',function(){mode='prettify';btnPrettify.classList.add('active');btnMinify.classList.remove('active');if(inputArea.value.trim())processCode()})
  btnProcess.addEventListener('click',processCode)
  btnCopy.addEventListener('click',function(){if(outputArea.value){try{navigator.clipboard.writeText(outputArea.value);statusText.textContent='已复制！'}catch(e){}}})
  btnClear.addEventListener('click',function(){inputArea.value='';outputArea.value='';statusText.textContent='等待输入…';inputArea.focus()})
  document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();processCode()};if(e.key==='Escape')inputArea.focus()})
  var autoTimer;inputArea.addEventListener('input',function(){if(autoTimer)clearTimeout(autoTimer);if(inputArea.value.trim())autoTimer=setTimeout(processCode,500);else{outputArea.value='';statusText.textContent='等待输入…'}})
  
  function detectLang(code){
    var t=code.trim()
    if(/^</.test(t)||/^<!DOCTYPE/i.test(t))return'html'
    if(/^[.#@]\w+\s*\{/.test(t)||/\{[\s\S]*:[^;]+;/.test(t))return'css'
    return'js'
  }
  function processCode(){
    var text=inputArea.value.trim()
    if(!text){outputArea.value='';statusText.textContent='等待输入…';return}
    var lang=langSelect.value==='auto'?detectLang(text):langSelect.value
    var result=mode==='minify'?minify(text,lang):prettify(text,lang)
    outputArea.value=result
    var diff=text.length-result.length
    statusText.textContent='✅ '+lang.toUpperCase()+' '+(mode==='minify'?'压缩':'美化')+'完成 | '+(diff>0?'缩小 '+diff+' 字符':diff<0?'增大 '+(-diff)+' 字符':'大小不变')
  }
  // Minify
  function minify(code,lang){
    if(lang==='html')return code.replace(/<!--[\s\S]*?-->/g,'').replace(/>\s+</g,'><').replace(/\s{2,}/g,' ').trim()
    if(lang==='css')return code.replace(/\/\*[\s\S]*?\*\//g,'').replace(/\s+/g,' ').replace(/\s*([{}:;,>~+])\s*/g,'$1').trim()
    return code.replace(/\/\/[^\n]*/g,'').replace(/\/\*[\s\S]*?\*\//g,'').replace(/\s+/g,' ').replace(/\s*([=+\-*/%&|^~!?:;{}()\[\],<>])\s*/g,'$1').replace(/;}/g,'}').trim()
  }
  // Prettify
  function prettify(code,lang){
    if(lang==='html'){var out='',ind=0,i=0;while(i<code.length){if(code[i]==='<'){var tag='';while(i<code.length&&code[i]!=='>'){tag+=code[i];i++}tag+='>';if(tag.indexOf('</')===0)ind=Math.max(0,ind-1)
    if(out.length>0&&out[out.length-1]!=='\n')out+='\n';for(var s=0;s<ind;s++)out+='  ';out+=tag;if(tag.indexOf('</')<0&&tag.indexOf('/>')<0&&tag.indexOf('<!')!==0)ind++}else out+=code[i];i++}
    return out.trim()}
    if(lang==='css'){code=code.replace(/\/\*[\s\S]*?\*\//g,'');var out2='';for(var j=0;j<code.length;j++){var c=code[j];if(c==='{'){out2+=' {\n  '}else if(c==='}'){out2+='\n}\n'}else if(c===';'){out2+=';\n  '}else out2+=c}return out2.trim()}
    // JS
    code=code.replace(/\/\/[^\n]*/g,'').replace(/\/\*[\s\S]*?\*\//g,'')
    var out3='',indent=0,inStr=false,sc=''
    for(var k=0;k<code.length;k++){var ch=code[k],next=code[k+1]||''
      if(inStr){out3+=ch;if(ch==='\\'&&next){out3+=next;k++}else if(ch===sc)inStr=false;continue}
      if(ch==="'"||ch==='"'||ch==='`'){inStr=true;sc=ch;out3+=ch;continue}
      if(ch==='{'){out3+=' {\n';indent++;for(var si=0;si<indent;si++)out3+='  ';continue}
      if(ch==='}'){indent=Math.max(0,indent-1);out3+='\n';for(var si2=0;si2<indent;si2++)out3+='  ';out3+='}';continue}
      if(ch===';'){out3+=';\n';for(var si3=0;si3<indent;si3++)out3+='  ';continue}
      if(ch===','&&k>0){out3+=',\n';for(var si4=0;si4<indent;si4++)out3+='  ';continue}
      if(ch==='\n'||ch==='\r')continue
      if(ch===' '||ch==='\t'){if(out3.length>0&&out3[out3.length-1]!==' '&&out3[out3.length-1]!=='\n')out3+=' ';continue}
      out3+=ch
    }
    return out3.replace(/\n{3,}/g,'\n\n').trim()
  }
  // 命令面板带参打开时，按命令选择压缩/美化并自动处理
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='plugin:init'&&e.data.data&&e.data.data.text){
      var cmd=e.data.data.command
      if(cmd==='code-prettify'){mode='prettify';btnPrettify.classList.add('active');btnMinify.classList.remove('active')}
      else{mode='minify';btnMinify.classList.add('active');btnPrettify.classList.remove('active')}
      inputArea.value=e.data.data.text;processCode()
    }
  })
  inputArea.focus()
})()
</script>
</body>
</html>
