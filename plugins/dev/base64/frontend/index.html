<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 编码解码</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="b64-container">
    <!-- 标题 -->
    <div class="b64-header">
      <svg class="b64-logo" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <span>Base64 编码 / 解码</span>
    </div>

    <!-- 模式切换 -->
    <div class="b64-mode">
      <button class="mode-btn active" data-mode="encode" id="btnEncode">编码 Encode</button>
      <button class="mode-btn" data-mode="decode" id="btnDecode">解码 Decode</button>
    </div>

    <!-- 输入区 -->
    <div class="b64-section">
      <label class="b64-label" id="inputLabel">输入文本</label>
      <textarea
        id="inputText"
        class="b64-textarea"
        placeholder="在此输入要编码的文本..."
        spellcheck="false"
      ></textarea>
    </div>

    <!-- 操作按钮 -->
    <div class="b64-actions">
      <button class="b64-btn primary" id="btnAction">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span id="actionLabel">编码</span>
      </button>
      <button class="b64-btn" id="btnClear">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        清空
      </button>
      <button class="b64-btn" id="btnSwap">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
        交换
      </button>
    </div>

    <!-- 输出区 -->
    <div class="b64-section">
      <div class="b64-label-row">
        <label class="b64-label" id="outputLabel">编码结果</label>
        <button class="copy-btn" id="btnCopy">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          复制
        </button>
      </div>
      <textarea
        id="outputText"
        class="b64-textarea output"
        readonly
        placeholder="结果将显示在这里..."
        spellcheck="false"
      ></textarea>
    </div>

    <!-- 状态信息 -->
    <div id="statusBar" class="b64-status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
