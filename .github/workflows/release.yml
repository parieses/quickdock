name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails3 CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Extract version from tag
        shell: pwsh
        run: |
          $ver = "$env:GITHUB_REF_NAME" -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "Building version: $ver"

      - name: Build frontend
        shell: pwsh
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Generate icon resource
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          wails3 generate syso -arch amd64 `
            -icon build/windows/icon.ico `
            -manifest build/windows/wails.exe.manifest `
            -info build/windows/info.json `
            -out wails_windows_amd64.syso

      - name: Generate WebView2 bootstrapper
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: wails3 generate webview2bootstrapper -dir build/windows/nsis

      - name: Build binary (production)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          go build -tags production `
            -trimpath -buildvcs=false `
            -ldflags="-w -s -H windowsgui -X main.appVersion=$env:VERSION" `
            -o bin/quickdock.exe .
          Remove-Item wails_windows_amd64.syso

      - name: Package NSIS installer
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          Copy-Item bin/quickdock.exe build/windows/nsis/quickdock.exe
          & "C:\Program Files (x86)\NSIS\makensis.exe" '-DARG_WAILS_AMD64_BINARY=quickdock.exe' 'build\windows\nsis\project.nsi'
          Remove-Item build/windows/nsis/quickdock.exe

      - name: Generate updater manifest
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          if ("${{ secrets.UPDATER_PRIVATE_KEY }}" -ne "") {
            Set-Content -Path updater.key -Value "${{ secrets.UPDATER_PRIVATE_KEY }}"
            $tag = "$env:GITHUB_REF_NAME"
            $urlPrefix = "https://github.com/parieses/quickdock/releases/download/$tag"
            wails3 updater manifest `
              -version "$env:VERSION" `
              -key updater.key `
              -url-prefix "$urlPrefix" `
              -output manifest.json `
              bin/quickdock-amd64-installer.exe
            Remove-Item updater.key -ErrorAction SilentlyContinue
          } else {
            echo "No UPDATER_PRIVATE_KEY secret set - skipping manifest signing"
          }

      - name: Create Release and Upload Assets
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ref = "$env:GITHUB_REF_NAME"
          # 尝试删除已存在的 release（忽略 503 等临时错误）
          try {
            gh release view $ref --json id 2>$null >$null
            if ($LASTEXITCODE -eq 0) {
              gh release delete $ref -y 2>$null
            }
          } catch {}
          # 创建 release（带 5 次重试）
          $assets = @("bin/quickdock-amd64-installer.exe", "manifest.json")
          $attempts = 0
          do {
            $attempts++
            if ($attempts -gt 1) { Start-Sleep -Seconds 3 }
            $ok = $true
            try {
              gh release create $ref --title $ref --generate-notes $assets 2>&1 | Out-Null
              $ok = $LASTEXITCODE -eq 0
            } catch {
              $ok = $false
            }
            if (-not $ok) { Write-Host "Attempt $attempts/5 failed, retrying..." }
          } while (-not $ok -and $attempts -lt 5)
          if (-not $ok) { throw "Failed to create release after 5 attempts" }
