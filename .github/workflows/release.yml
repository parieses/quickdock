name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails3 CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Extract version from tag
        shell: pwsh
        run: |
          $ver = "$env:GITHUB_REF_NAME" -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "Building version: $ver"

      - name: Build frontend
        shell: pwsh
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Generate icon resource
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          wails3 generate syso -arch amd64 `
            -icon build/windows/icon.ico `
            -manifest build/windows/wails.exe.manifest `
            -info build/windows/info.json `
            -out wails_windows_amd64.syso

      - name: Build binary (production)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          go build -tags production `
            -trimpath -buildvcs=false `
            -ldflags="-w -s -H windowsgui -X main.appVersion=$env:VERSION" `
            -o bin/quickdock-v3.exe .
          Remove-Item wails_windows_amd64.syso

      - name: Package NSIS installer
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          Copy-Item bin/quickdock-v3.exe build/windows/nsis/quickdock-v3.exe
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            -DARG_WAILS_AMD64_BINARY=quickdock-v3.exe `
            "$pwd\build\windows\nsis\project.nsi"
          Remove-Item build/windows/nsis/quickdock-v3.exe

      - name: Generate updater manifest
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          if ("${{ secrets.UPDATER_PRIVATE_KEY }}" -ne "") {
            Set-Content -Path updater.key -Value "${{ secrets.UPDATER_PRIVATE_KEY }}"
            $tag = "$env:GITHUB_REF_NAME"
            $urlPrefix = "https://github.com/parieses/quickdock/releases/download/$tag"
            wails3 updater manifest `
              -version "$env:VERSION" `
              -key updater.key `
              -url-prefix "$urlPrefix" `
              -output manifest.json `
              bin/quickdock-v3-amd64-installer.exe
            Remove-Item updater.key -ErrorAction SilentlyContinue
          } else {
            echo "No UPDATER_PRIVATE_KEY secret set - skipping manifest signing"
          }

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/quickdock-v3-amd64-installer.exe
            manifest.json
          generate_release_notes: true
          fail_on_unmatched_files: false
