name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Wails3 CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Extract version from tag
        shell: pwsh
        run: |
          $ver = "$env:GITHUB_REF_NAME" -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "Building version: $ver"

      - name: Build frontend
        shell: pwsh
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Generate icon resource
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          wails3 generate syso -arch amd64 `
            -icon build/windows/icon.ico `
            -manifest build/windows/wails.exe.manifest `
            -info build/windows/info.json `
            -out wails_windows_amd64.syso

      - name: Generate WebView2 bootstrapper
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: wails3 generate webview2bootstrapper -dir build/windows/nsis

      - name: Build binary (production)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          go build -tags production `
            -trimpath -buildvcs=false `
            -ldflags="-w -s -H windowsgui -X main.appVersion=$env:VERSION" `
            -o bin/quickdock.exe .
          Remove-Item wails_windows_amd64.syso

      - name: Package NSIS installer
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          Copy-Item bin/quickdock.exe build/windows/nsis/quickdock.exe
          & "C:\Program Files (x86)\NSIS\makensis.exe" '-DARG_WAILS_AMD64_BINARY=quickdock.exe' 'build\windows\nsis\project.nsi'
          Remove-Item build/windows/nsis/quickdock.exe

      - name: Generate updater manifest
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          if ("${{ secrets.UPDATER_PRIVATE_KEY }}" -ne "") {
            Set-Content -Path updater.key -Value "${{ secrets.UPDATER_PRIVATE_KEY }}"
            $tag = "$env:GITHUB_REF_NAME"
            $urlPrefix = "https://github.com/parieses/quickdock/releases/download/$tag"
            wails3 updater manifest `
              -version "$env:VERSION" `
              -key updater.key `
              -url-prefix "$urlPrefix" `
              -output manifest.json `
              bin/quickdock-amd64-installer.exe
            Remove-Item updater.key -ErrorAction SilentlyContinue
          } else {
            echo "No UPDATER_PRIVATE_KEY secret set - skipping manifest signing"
          }

      - name: Create Release and Upload Assets
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ref = "$env:GITHUB_REF_NAME"
          # 如果 release 已存在（之前失败残留），删掉再重来
          gh release delete $ref -y 2>$null
          Start-Sleep -Seconds 2
          # 创建 release（不带 asset），报错则重试 3 次
          $attempts = 0
          do {
            $attempts++
            Write-Host "Creating release $ref (attempt $attempts)..."
            $output = gh release create $ref --title $ref --generate-notes 2>&1
            $ok = $LASTEXITCODE -eq 0
            if (-not $ok) {
              Write-Host "Failed: $output"
              Start-Sleep -Seconds 5
            }
          } while (-not $ok -and $attempts -lt 3)
          if (-not $ok) { throw "Failed to create release" }
          # 逐个上传 asset（第一个出错不影响第二个）
          Write-Host "Uploading bin/quickdock-amd64-installer.exe..."
          gh release upload $ref "bin/quickdock-amd64-installer.exe" --clobber 2>&1
          Write-Host "Uploading manifest.json..."
          gh release upload $ref "manifest.json" --clobber 2>&1
